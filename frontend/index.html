<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="HabitFlow - Track your daily habits, earn points, and visualize your progress with beautiful statistics." />
  <meta name="theme-color" content="#7c3aed" />
  <meta property="og:title" content="HabitFlow - Daily Habit Tracker" />
  <meta property="og:description" content="Build habits. Earn points. Transform your life." />
  <title>HabitFlow - Daily Habit Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js')
          .then((reg) => {
            console.log('[App] Service Worker registered, scope:', reg.scope);

            // Check for updates every 60 seconds so deployed code is picked up quickly
            setInterval(() => reg.update(), 60 * 1000);

            // Listen for a new service worker installing
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[App] New content available — reloading…');
                  }
                });
              }
            });
          })
          .catch((err) => console.warn('[App] SW registration failed:', err));

        // Auto-reload when a new service worker takes control.
        // This fires after skipWaiting() + clients.claim() in sw.js.
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          console.log('[App] New service worker active — reloading page.');
          window.location.reload();
        });
      });
    }
  </script>
</body>

</html>
